spring:
  profiles:
    active: local
  web:
    resources:
      static-locations: "classpath:/static/,classpath:/META-INF/resources/"
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      mvc:
        routes:
          - id: org-service
            uri: http://org-service:8080
            predicates:
              - Path=/org/**
            filters:
              - StripPrefix=1

          - id: offering-service
            uri: http://offering-service:8080
            predicates:
              - Path=/offering/**
            filters:
              - StripPrefix=1

          - id: activity-service
            uri: http://activity-service:8080
            predicates:
              - Path=/activity/**
            filters:
              - StripPrefix=1

          - id: prayer-service
            uri: http://prayer-service:8080
            predicates:
              - Path=/prayer/**
            filters:
              - StripPrefix=1
              -
          - id: user-service
            uri: http://user-service:8080
            predicates:
              - Path=/user/**
            filters:
              - StripPrefix=1

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    persistAuthorization: true
    disable-swagger-default-url: true
    display-query-params-with-default: true
    urls:
      - name: org-service
        url: /org/v3/api-docs
      - name: offering-service
        url: /offering/v3/api-docs
      - name: activity-service
        url: /activity/v3/api-docs
      - name: prayer-service
        url: /prayer/v3/api-docs
      - name: user-service
        url: /user/v3/api-docs

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

downstream:
  offering-service: http://offering-service:8080
  activity-service: http://activity-service:8080
  prayer-service: http://prayer-service:8080
  user-service: http://user-service:8080
  org-service: http://org-service:8080

jwt:
  secret: ${JWT_SECRET}
  issuer: ${JWT_ISSUER}
  audience: ${JWT_AUDIENCE}
  cookie-name: ${JWT_COOKIE_NAME}

security:
  internal:
    hmac-secret: ${INTERNAL_HMAC_SECRET}
  auth:
    permit-paths:
      - /health
      - /info
      - /actuator/health
      - /public/**
      - /error
    admin-paths:
      - /api/admin/**
    internal-headers:
      user-id: X-Auth-User-Id
      user-role: X-Auth-User-Role
      user-name: X-Auth-User-Name
      org-id: X-Auth-Org-Id
    remove-external-headers:
      - X-Auth-User-Id
      - X-Auth-User-Role
      - X-Auth-User-Name
      - X-Auth-Org-Id
      - X-From-Gateway
      - X-Internal-Timestamp
      - X-Internal-Signature
      - X-Internal-Api-Key
      - X-Caller-Service
