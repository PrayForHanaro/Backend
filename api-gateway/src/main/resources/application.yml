spring:
  config:
    import: classpath:security.yml

  profiles:
    active: local

  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

downstream:
  offering-service: http://offering-service:8080
  activity-service: http://activity-service:8080
  prayer-service: http://prayer-service:8080
  user-service: http://user-service:8080
  org-service: http://org-service:8080

jwt:
  cookie-name: accessToken