server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:
        - id: org-service
          uri: http://org-service:8082
          predicates:
            - Path=/orgs/**

        - id: user-service
          uri: http://user-service:8083
          predicates:
            - Path=/users/**

        - id: offering-service
          uri: http://offering-service:8084
          predicates:
            - Path=/offerings/**

        - id: activity-service
          uri: http://activity-service:8085
          predicates:
            - Path=/activities/**

        - id: prayer-service
          uri: http://prayer-service:8086
          predicates:
            - Path=/prayers/**