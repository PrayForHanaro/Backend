spring:
  config:
    import: optional:classpath:security.yml

  profiles:
    active: local

  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: offering-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/offerings/**
              filters:
                - StripPrefix=1

            - id: activity-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/activities/**
              filters:
                - StripPrefix=1

            - id: prayer-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/prayers/**
              filters:
                - StripPrefix=1

            - id: user-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/users/**
              filters:
                - StripPrefix=1

            - id: org-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/orgs/**
              filters:
                - StripPrefix=1

      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info