spring:
  profiles:
    active: local

  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: offering-service
          uri: http://localhost:8081/
          predicates:
            - Path=/offerings/**
        - id: activity-service
          uri: http://localhost:8082/
          predicates:
            - Path=/activities/**
        - id: prayer-service
          uri: http://localhost:8083/
          predicates:
            - Path=/prayers/**
        - id: user-service
          uri: http://localhost:8084/
          predicates:
            - Path=/users/**
        - id: org-service
          uri: http://localhost:8085/
          predicates:
            - Path=/users/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info