name: Financial Service CI/CD

on:
  push:
    branches: ["main"]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed modules
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            org-service:
              - 'org-service/**'
              - 'common/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle.properties'
              - 'gradlew'
              - 'gradle/wrapper/**'
            user-service:
              - 'user-service/**'
              - 'common/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle.properties'
              - 'gradlew'
              - 'gradle/wrapper/**'
            offering-service:
              - 'offering-service/**'
              - 'common/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle.properties'
              - 'gradlew'
              - 'gradle/wrapper/**'
            activity-service:
              - 'activity-service/**'
              - 'common/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle.properties'
              - 'gradlew'
              - 'gradle/wrapper/**'
            prayer-service:
              - 'prayer-service/**'
              - 'common/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle.properties'
              - 'gradlew'
              - 'gradle/wrapper/**'
            api-gateway:
              - 'api-gateway/**'
              - 'common/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle.properties'
              - 'gradlew'
              - 'gradle/wrapper/**'

  build-and-push:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.modules != '[]' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect-changes.outputs.modules) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build module
        run: ./gradlew :${{ matrix.module }}:build -x test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        working-directory: ./${{ matrix.module }}
        run: |
          docker build \
            -f Dockerfile \
            -t $ECR_REGISTRY/${{ matrix.module }}:$IMAGE_TAG \
            -t $ECR_REGISTRY/${{ matrix.module }}:latest \
            .

          docker push $ECR_REGISTRY/${{ matrix.module }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ matrix.module }}:latest

  deploy:
    needs: [detect-changes, build-and-push]
    if: ${{ needs.detect-changes.outputs.modules != '[]' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "==== ECR Login ===="
            aws ecr get-login-password --region ap-northeast-2 | \
            docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com

            echo "==== Move to project directory ===="
            cd ~/project

            echo "==== Deploy changed services only ===="
            CHANGED='${{ needs.detect-changes.outputs.modules }}'

            for service in $(echo "$CHANGED" | jq -r '.[]'); do
              echo "Deploying $service"
              docker-compose pull $service
              docker-compose up -d --no-deps $service
            done

            echo "==== Remove unused containers ===="
            docker system prune -f