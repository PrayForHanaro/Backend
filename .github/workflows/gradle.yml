name: Financial Service CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # [STEP 1] 변경된 모듈 감지
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed modules
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            org-service:
              - 'org-service/**'
              - 'common/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle.properties'
              - 'gradlew'
              - 'gradle/wrapper/**'
            user-service:
              - 'user-service/**'
              - 'common/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle.properties'
              - 'gradlew'
              - 'gradle/wrapper/**'
            offering-service:
              - 'offering-service/**'
              - 'common/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle.properties'
              - 'gradlew'
              - 'gradle/wrapper/**'
            activity-service:
              - 'activity-service/**'
              - 'common/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle.properties'
              - 'gradlew'
              - 'gradle/wrapper/**'
            prayer-service:
              - 'prayer-service/**'
              - 'common/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle.properties'
              - 'gradlew'
              - 'gradle/wrapper/**'
            api-gateway:
              - 'api-gateway/**'
              - 'common/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle.properties'
              - 'gradlew'
              - 'gradle/wrapper/**'

  # [STEP 2] 변경된 모듈만 빌드 + Docker 이미지 생성 확인
  build-and-docker:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.modules != '[]' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect-changes.outputs.modules) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build module
        run: ./gradlew :${{ matrix.module }}:build -x test

      - name: Build Docker image
        run: |
          docker build \
            -f ./${{ matrix.module }}/Dockerfile \
            -t ${{ matrix.module }}:ci-test \
            ./${{ matrix.module }}
