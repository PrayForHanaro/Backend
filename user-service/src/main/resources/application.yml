spring:
  profiles:
    active: local
  application:
    name: user-service

  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        jdbc:
          batch_size: 50
          time_zone: Asia/Seoul
        order_inserts: true
        order_updates: true
        format_sql: true
        use_sql_comments: true
  sql:
    init:
      mode: never
      schema-locations: classpath:sql/init.sql
feign:
  circuitbreaker:
    enabled: true

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: ${AWS_REGION}
    s3:
      bucket: ${AWS_S3_BUCKET}

security:
  internal:
    hmac-secret: ${INTERNAL_HMAC_SECRET}
    api-key: ${INTERNAL_API_KEY:user-service-key}
    valid-api-keys: ${INTERNAL_VALID_API_KEYS:user-service-key,activity-service-key,offering-service-key,prayer-service-key,org-service-key}

downstream:
  offering-service: ${OFFERING_SERVICE_DOWNSTREAM}
  activity-service: ${ACTIVITY_SERVICE_DOWNSTREAM}
  prayer-service: ${PRAYER_SERVICE_DOWNSTREAM}
  org-service: ${ORG_SERVICE_DOWNSTREAM}