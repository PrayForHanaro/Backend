server:
  port: 0   # 랜덤 포트 (충돌 방지)

spring:
  application:
    name: offering-service-test

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  sql:
    init:
      mode: never

feign:
  circuitbreaker:
    enabled: false   # 테스트에서는 필요 없음

