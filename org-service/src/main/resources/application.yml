server:
  port: 8082

spring:
  application:
    name: org-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://org-db:3306/org_db?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/init.sql
  config:
    import: classpath:secret.yml