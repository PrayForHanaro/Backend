server:
  port: 8085

spring:
  application:
    name: activity-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://activity-db:3306/activity_db?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/init.sql
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  config:
    import: classpath:secret.yml

feign:
  circuitbreaker:
    enabled: true