plugins {
    id 'java-library'
}

group = 'com.hanaro'
version = '0.0.1-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.security:spring-security-core:6.3.4'
    implementation 'org.springframework:spring-web:6.1.14'
}